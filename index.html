<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #open-envelope { display: none; }

        .envelope-wrapper {
            transition: transform 0.6s ease-in-out;
            position: relative;
        }

        .card {
            transition: all 0.7s ease-in-out;
            z-index: 10;
            height: 195px; /* Aumentamos un poco la altura para acomodar mejor el texto */
            opacity: 0; 
        }

        .flap {
            transition: transform 0.4s ease-in-out;
            transform-origin: top;
            z-index: 30; 
        }

        .front-panel {
            z-index: 20; 
        }

        /* Animaciones al abrir */
        #open-envelope:checked ~ .envelope-wrapper .flap {
            transform: rotateX(180deg);
            z-index: 5; 
        }

        #open-envelope:checked ~ .envelope-wrapper .card {
            transform: translateY(-140px); /* Sube un poco más */
            opacity: 1; 
        }

        #open-envelope:checked ~ .envelope-wrapper {
            transform: translateY(60px); 
        }
    </style>
</head>
<body class="bg-rose-50 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="text-center w-full max-w-xs">
        <h1 class="text-xl font-bold text-rose-600 mb-16 px-4">Un mensajito para mi niña ✨</h1>
        
        <input type="checkbox" id="open-envelope">
        
        <label for="open-envelope" class="envelope-wrapper relative block w-64 h-40 bg-rose-200 rounded-b-xl shadow-2xl mx-auto cursor-pointer">
            
            <div class="flap absolute top-0 left-0 w-full h-1/2 bg-rose-300 rounded-t-xl border-b-2 border-rose-400"></div>
            
            <div class="card absolute top-2 left-3 right-3 bg-white p-5 rounded-lg shadow-md text-left border border-rose-100 flex flex-col justify-between">
                <div>
                    <p class="text-rose-600 font-bold text-sm mb-2">¡Hola, mi amor! ❤️</p>
                    <p class="text-gray-600 text-xs leading-relaxed">
                        Sé que el trabajo está pesado hoy, pero no olvides que eres <strong>increíblemente capaz</strong>. 
                        <br><br>
                        Respira, un paso a la vez. ¡Tú puedes con esto y más! 
                    </p>
                </div>
                <div class="w-full flex justify-end mt-2">
                    <span class="text-rose-500 font-medium text-[11px] italic pr-1">- Siempre contigo.</span>
                </div>
            </div>

            <div class="front-panel absolute bottom-0 left-0 w-full h-1/2 bg-rose-200 rounded-b-xl border-t-2 border-rose-100 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            </div>

            <span class="text-3xl absolute bottom-3 left-1/2 -translate-x-1/2 z-40 transition-opacity duration-300 peer-checked:opacity-0">💌</span>
        </label>

        <p class="mt-24 text-rose-400 text-xs animate-bounce font-medium uppercase tracking-widest">¡Toca el sobre!</p>
    </div>

</body>
</html>
